name: Dependabot auto-approve

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  approve:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve Dependabot pull request
        id: pr
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref = context.payload.workflow_run.pull_requests[0]
            if (!ref) {
              core.info('No pull request attached to this workflow run.')
              return
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ref.number,
            })
            if (pr.user.login !== 'dependabot[bot]') {
              core.info(`PR #${ref.number} authored by ${pr.user.login}, not dependabot[bot]. Skipping.`)
              return
            }
            core.setOutput('number', ref.number)

      - name: Approve Dependabot pull request
        if: steps.pr.outputs.number
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.pr.outputs.number }},
              event: 'APPROVE',
              body: 'Automatically approved after CI passed.'
            })

      - name: Enable auto-merge
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: gh pr merge --auto --squash --delete-branch "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

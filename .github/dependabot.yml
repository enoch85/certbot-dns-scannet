version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    target-branch: main
    commit-message:
      prefix: chore
    labels:
      - dependencies
      - docker